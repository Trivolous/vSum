<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>YouTube Summarizer Settings</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="popup-body">
    <div class="popup-header">
      <h2 style="color: #f00">vSum</h2>
      <h2>Settings</h2>
    </div>

    <div class="config-group">
      <div class="input-wrapper">
        <label for="backend_url">Backend URL</label>
        <input type="text" id="backend_url" placeholder="http://localhost:5000" />
      </div>

      <div class="input-wrapper">
        <label for="gemini_key">Gemini API Key</label>
        <input type="password" id="gemini_key" placeholder="AIza..." />
      </div>

      <div class="input-wrapper">
        <label for="aai_key">AssemblyAI Key</label>
        <input type="password" id="aai_key" placeholder="Key..." />
      </div>

      <div class="input-wrapper">
        <label for="gemini_model">Gemini Model</label>
        <select id="gemini_model">
          <option value="gemini-3.1-pro">Gemini 3.1 Pro (Flagship)</option>
          <option value="gemini-3-flash">Gemini 3 Flash (Fast)</option>
          <option value="gemini-3-deep-think">Gemini 3 Deep Think</option>
          <option value="custom">Custom Model...</option>
        </select>
      </div>

      <div id="custom_model_wrapper" class="input-wrapper" style="display: none">
        <label for="custom_model_name">Model Name</label>
        <input type="text" id="custom_model_name" placeholder="e.g. gemini-3.1-pro-preview" />
      </div>

      <div class="input-wrapper">
        <label for="aai_model">Transcription Model</label>
        <select id="aai_model">
          <option value="universal-3-pro">Universal-3 Pro (EN, ES, FR, DE, IT, PT)</option>
          <option value="universal-2">Universal-2 (99+ Languages)</option>
        </select>
      </div>
    </div>

    <div class="popup-footer">
      <button id="save" class="save-btn">Save</button>
      <button id="open_dashboard" class="secondary-btn">Archive</button>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
