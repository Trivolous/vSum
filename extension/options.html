<!doctype html>
<html>
  <head>
    <title>YouTube Summarizer Einstellungen</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 30px;
      }
      input {
        width: 400px;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      button {
        padding: 10px 20px;
        background: #4caf50;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      .status {
        margin-top: 10px;
        color: green;
      }
    </style>
  </head>
  <body>
    <h1>Einstellungen</h1>
    <p>Gib hier deinen Google Gemini API Key ein:</p>
    <input type="password" id="api-key" placeholder="AIzaSy..." />
    <button id="save">Speichern</button>
    <div class="status" id="status"></div>

    <script src="options.js"></script>
  </body>
</html>
